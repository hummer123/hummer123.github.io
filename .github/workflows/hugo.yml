# ============================================================================
# Hugo 自动部署到 GitHub Pages
# ============================================================================
# 参考官方文档：https://hugo.opendocs.io/hosting-and-deployment/hosting-on-github/
# Pages Source 必须是 "GitHub Actions"（在 Settings → Pages 配置）

name: 发布 Hugo 网站到 Pages

on:
  # 在目标为默认分支的推送上运行
  push:
    branches:
      - main
  # 允许从 Actions 标签页手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 仅允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

# 默认使用 bash
defaults:
  run:
    shell: bash

jobs:
  # 构建作业
  build:
    runs-on: ubuntu-latest
    env:
      # Hugo 版本：PaperMod 要求 ≥ 0.146.0
      HUGO_VERSION: 0.147.4
    steps:
      - name: 安装 Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: 安装 Dart Sass
        run: sudo snap install dart-sass

      - name: 检出
        uses: actions/checkout@v4
        with:
          submodules: recursive      # PaperMod 是 submodule
          fetch-depth: 0

      - name: 设置 Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: 安装 Node.js 依赖
        run: '[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true'

      - name: 使用 Hugo 构建
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 部署作业
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4